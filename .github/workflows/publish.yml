name: Publish calendar

on:
  push:
    branches: [main]
  schedule:
    # The next-year calendar is normally approved in late summer or autumn.
    # Check only in July-October instead of polling all year.
    - cron: "17 5 * 7-10 1"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate calendar
        run: python generate_ru_prod_calendar.py --update

      - name: Validate calendar
        run: python validate_ics.py ru-production-calendar.ics ru-production-calendar-ios.ics

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ru_prod_calendar_data.json ru-production-calendar.ics ru-production-calendar-ios.ics
          if ! git diff --cached --quiet; then
            git commit -m "Update production calendar"
            git push
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp ru-production-calendar.ics public/ru-production-calendar.ics
          cp ru-production-calendar-ios.ics public/ru-production-calendar-ios.ics
          cp ru-production-calendar.ics public/index.ics
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Производственный календарь РФ</title>
            </head>
            <body>
              <h1>Производственный календарь РФ</h1>
              <p><a href="./ru-production-calendar.ics">Ссылка на календарь для подписки</a></p>
            </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
